<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校生向け・4択英単語テスト</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 20px; color: #333; margin-top: 0; }
        .japanese { font-size: 24px; font-weight: bold; color: #333; margin: 20px 0; word-break: break-all; }
        .progress { color: #666; font-size: 14px; margin-bottom: 15px; }
        .btn {
            background-color: white;
            color: #333;
            border: 2px solid #e0e0e0;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #f7f9fa; }
        .choice-btn { font-size: 18px; letter-spacing: 0.5px; }
        .action-btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .result-message { font-size: 18px; font-weight: bold; margin: 15px 0; }
        .correct { color: #2ecc71; border-color: #2ecc71 !important; background-color: #eafeec; }
        .incorrect { color: #e74c3c; border-color: #e74c3c !important; background-color: #fdedec; }
    </style>
</head>
<body>
 
<div class="quiz-container">
    <div id="category-screen">
        <div style="font-size: 16px; color: #555; font-weight: bold; margin-bottom: 5px; text-align: center;">エリスフィールド進学会</div>
        <h1>テストするカテゴリを選んでね</h1>
        <div id="category-list"></div>
    </div>
 
    <div id="quiz-screen" style="display: none;">
        <div class="progress" id="progress">第 1 問 / 全 10 問</div>
        <div class="japanese" id="japanese-word">日本語</div>

        <button onclick="speakWord()" class="btn"
            style="margin-bottom:20px;max-width:200px;margin-left:auto;
            margin-right:auto;padding:10px;font-size:16px;">
            🔊 発音を聞く
        </button>

        <div id="choices-list"></div>

        <div class="result-message" id="result-message"></div>

        <button onclick="nextQuestion()" id="next-btn" class="action-btn" style="display:none;">
            次へ進む
        </button>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>テスト終了！</h2>
        <p id="final-score" style="font-size: 18px; font-weight: bold;"></p>
        <button onclick="showCategoryScreen()" class="action-btn">
            別のテストを選ぶ
        </button>
    </div>
</div>
 
<script>
// ★ 高校生向けのサンプルデータ（必要に応じてここを自由に追加・編集してください）
const wordData = {
    "シス単281〜520": [
        { english: "previous", japanese: "前の" },
        { english: "specific", japanese: "特定の、具体的な" },
        { english: "conscious", japanese: "意識している、意識的な" },
        { english: "narrow", japanese: "狭い、細い" },
        { english: "eager", japanese: "熱望している、熱心な" },
        { english: "anxious", japanese: "心配して、不安な、切望して" },
        { english: "therefore", japanese: "それゆえに、したがって" },
        { english: "seldom", japanese: "めったに〜ない" },
        { english: "in spite of", japanese: "にもかかわらず" },
        { english: "accept", japanese: "〜を受け入れる" },
        { english: "avoid", japanese: "〜を避ける" },
        { english: "ignore", japanese: "〜を無視する" },
        { english: "guess", japanese: "〜を推測する" },
        { english: "obtain", japanese: "〜を得る" },
        { english: "annoy", japanese: "〜をいらだたせる" },
        { english: "apologize", japanese: "謝る" },
        { english: "inform", japanese: "〜に知らせる" },
        { english: "overcome", japanese: "〜に打ち勝つ" },
        { english: "predict", japanese: "〜を予言する" },
        { english: "resemble", japanese: "〜に似ている" },
        { english: "consume", japanese: "〜を消費する" },
        { english: "purpose", japanese: "目的" },
        { english: "behavior", japanese: "行動、ふるまい" },
        { english: "opportunity", japanese: "機会" },
        { english: "source", japanese: "源" },
        { english: "habit", japanese: "習慣" },
        { english: "crowd", japanese: "群衆" },
        { english: "responsibility", japanese: "責任" },
        { english: "organization", japanese: "組織" },
        { english: "temperature", japanese: "気温" },
        { english: "equipment", japanese: "設備" },
        { english: "phenomenon", japanese: "現象" },
        { english: "confidence", japanese: "自信" },
        { english: "instrument", japanese: "道具" },
        { english: "victim", japanese: "犠牲者" },
        { english: "ancestor", japanese: "祖先" },
        { english: "analysis", japanese: "分析" },
        { english: "agriculture", japanese: "農業" },
        { english: "evidence", japanese: "証拠" },
        { english: "consequence", japanese: "結果" }
    ],
    "論評・UP英小テスト③": [
        { english: "be likely to V", japanese: "Vしそうだ" },
        { english: "distinguish A from B", japanese: "AをBと区別する" },
        { english: "be related to 〜", japanese: "〜に関係している" },
        { english: "take on 〜", japanese: "〜を引き受ける" },
        { english: "day-to-day routine", japanese: "毎日の決まりきった仕事" },
        { english: "leave O behind", japanese: "Oを後に残す" },
        { english: "discrimination", japanese: "差別" },
        { english: "critically", japanese: "批判的に" },
        { english: "stereotype 〜", japanese: "〜を型にはめて見る" },
        { english: "intend to V", japanese: "Vしようとする" },
        { english: "evidence", japanese: "証拠" },
        { english: "it is no use Ving", japanese: "Vしても無駄である" },
        { english: "look forward to Ving", japanese: "Vすることを楽しみにしている" },
        { english: "object to Ving", japanese: "Vすることに反対する" },
        { english: "when it comes to Ving", japanese: "（話題が）Vすることになると" },
        { english: "have difficulty in Ving", japanese: "Vするのに苦労する" },
        { english: "be busy in Ving", japanese: "Vするのに忙しい" },
        { english: "There is no Ving", japanese: "Vできない" },
        { english: "It goes without saying that 〜", japanese: "〜は言うまでもない" },
        { english: "on Ving", japanese: "Vするとすぐに" }
    ]
    
    "共通テスト頻出動詞": [
        { english: "analyze", japanese: "〜を分析する" },
        { english: "consequence", japanese: "結果、影響" },
        { english: "critical", japanese: "批判的な、重大な" },
        { english: "maintain", japanese: "〜を維持する、主張する" },
        { english: "evaluate", japanese: "〜を評価する" },
        { english: "acquire", japanese: "〜を習得する、獲得する" },
        { english: "contribute", japanese: "貢献する、寄付する" },
        { english: "establish", japanese: "〜を設立する、確立する" },
        { english: "purchase", japanese: "〜を購入する" },
        { english: "accomplish", japanese: "〜を成し遂げる" }
    ],
    "医療・動植物（国公立・私大レベル）": [
        { english: "symptom", japanese: "症状、兆候" },
        { english: "diagnose", japanese: "〜を診断する" },
        { english: "vaccine", japanese: "ワクチン" },
        { english: "immune", japanese: "免疫のある" },
        { english: "organism", japanese: "有機体、生物" }
    ]
};
 
let currentCategory = ""; 
let currentWords = []; 
let currentIndex = 0; 
let score = 0; 
let isAnswered = false;

function showCategoryScreen() {
    document.getElementById("category-screen").style.display = "block";
    document.getElementById("quiz-screen").style.display = "none"; 
    document.getElementById("result-screen").style.display = "none";
    
    const catListDiv = document.getElementById("category-list");
    catListDiv.innerHTML = "";
    
    // カテゴリを画面に生成
    Object.keys(wordData).forEach(category => {
        const btn = document.createElement("button"); 
        btn.className = "btn"; 
        btn.innerText = category; 
        btn.onclick = () => startQuiz(category); 
        catListDiv.appendChild(btn);
    });
}

function startQuiz(category) {
    currentCategory = category; 
    currentWords = [...wordData[category]].sort(() => Math.random() - 0.5);
    
    // 最大10問に出題数を制限
    if (currentWords.length > 10) { currentWords = currentWords.slice(0, 10); }
    
    currentIndex = 0; 
    score = 0;
    
    document.getElementById("category-screen").style.display = "none";
    document.getElementById("quiz-screen").style.display = "block"; 
    showQuestion();
}

function showQuestion() {
    isAnswered = false;
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("result-message").innerText = "";
    
    const currentQuestion = currentWords[currentIndex];
    document.getElementById("progress").innerText = `第 ${currentIndex + 1} 問 / 全 ${currentWords.length} 問`; 
    document.getElementById("japanese-word").innerHTML = currentQuestion.japanese;
    
    // 4択の選択肢を作成
    const choices = makeChoices(currentQuestion.english, wordData[currentCategory]); 
    const choicesListDiv = document.getElementById("choices-list"); 
    choicesListDiv.innerHTML = "";
    
    choices.forEach(choice => {
        const btn = document.createElement("button"); 
        btn.className = "btn choice-btn"; 
        btn.innerText = choice; 
        btn.onclick = () => checkAnswer(btn, choice, currentQuestion.english); 
        choicesListDiv.appendChild(btn);
    });
}

// 4択のダミー選択肢を生成するロジック
function makeChoices(correctAnswer, allCategoryWords) {
    const allEnglish = allCategoryWords.map(w => w.english); 
    let dummies = allEnglish.filter(eng => eng !== correctAnswer); 
    dummies.sort(() => Math.random() - 0.5); 
    let chosenDummies = dummies.slice(0, 3);
    
    // カテゴリ内の単語が4つ未満の場合の固定ダミー
    while (chosenDummies.length < 3) { 
        chosenDummies.push("analyze", "maintain", "significant", "consequence"); 
    }
    
    let finalChoices = [correctAnswer, ...chosenDummies.slice(0, 3)];
    return finalChoices.sort(() => Math.random() - 0.5);
}

function checkAnswer(clickedBtn, selected, correct) {
    if (isAnswered) return; 
    isAnswered = true; 
    
    const choiceButtons = document.querySelectorAll(".choice-btn"); 
    const resultMsg = document.getElementById("result-message");
    
    if (selected === correct) {
        clickedBtn.classList.add("correct"); 
        resultMsg.innerText = "⭕ 正解！"; 
        resultMsg.style.color = "#2ecc71"; 
        score++; 
    } else { 
        clickedBtn.classList.add("incorrect"); 
        resultMsg.innerText = `❌ 不正解！ 正解は: ${correct}`; 
        resultMsg.style.color = "#e74c3c";
        choiceButtons.forEach(btn => { 
            if (btn.innerText === correct) { btn.classList.add("correct"); } 
        }); 
    }
    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() { 
    currentIndex++; 
    if (currentIndex < currentWords.length) { 
        showQuestion(); 
    } else { 
        showResult(); 
    } 
}

function showResult() {
    document.getElementById("quiz-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    document.getElementById("final-score").innerText = `${currentWords.length} 問中 ${score} 問 正解！`;
}

// 発音機能（現在出題中の英単語を喋らせる）
function speakWord() {
    if (!('speechSynthesis' in window)) {
        alert('このブラウザは音声再生に対応していません。Chromeをご利用ください。');
        return;
    }

    const currentQuestion = currentWords[currentIndex];
    let word = currentQuestion.english.replace(/～/g, '').replace(/~/g, '').trim();
    
    if (word === "read" && currentQuestion.japanese.includes("過去")) {
        word = "red";
    }
    
    speechSynthesis.cancel();

    const uttr = new SpeechSynthesisUtterance(word);
    uttr.lang = 'en-US';
    uttr.rate = 1.0;

    speechSynthesis.speak(uttr);
}

// 最初にカテゴリ選択画面を起動
showCategoryScreen();
</script>
</body>
</html>
